{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 3rem auto;">
  <h2 style="margin-top: 0;">SupportOID Login</h2>
  <p class="muted">RBAC roles: <code>admin</code>, <code>analyst</code>, <code>support</code>.</p>
  {% if error %}
  <p class="danger"><strong>{{ error }}</strong></p>
  {% endif %}
  <form method="post" action="/login">
    <label>Username</label>
    <input name="username" required />
    <label style="margin-top: 0.8rem; display: block;">Password</label>
    <input name="password" type="password" required />
    <button class="primary" type="submit" style="margin-top: 1rem; width: 100%;">Sign In</button>
  </form>
  <p class="muted" style="margin-bottom: 0;">
    Default local credentials live in settings and should be overridden in production.
  </p>
</div>
{% endblock %}
